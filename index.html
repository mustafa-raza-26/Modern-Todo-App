<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NeonTask</title>
    <link rel="shortcut icon" href="assest/images/logo.png" type="image/x-icon">
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="login.css">
    <script src="https://kit.fontawesome.com/63fac70219.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=lock" />
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <span class="d-flex justify-content-center logo_word"><img src="assest/images/logo.png" width="50px" height="40px" alt=""><h1 class="neon-text h2">NEON_TASK</h1></span>
                <p class="text-secondary small">Precision productivity in the dark.</p>
            </div>
            
            <form>
                <div class="mb-3">
                    <label class="form-label text-uppercase small fw-bold">Email Address</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="name@domain.com" required>
                    <span><i class="fa-regular fa-envelope"></i></span>
                </div>
                <div class="mb-4">
                    <label class="form-label text-uppercase small fw-bold">Security Key</label>
                    <span class="material-symbols-outlined lock">lock</span>
                    <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
                    <span><i class="fa-regular fa-eye"></i></span>
                </div>
                <button type="submit" id="loginBtn" class="neon-btn w-100">Login &rarr;</button>
            </form>

            <div class="row text-center mt-4 pt-2 border-top border-secondary border-opacity-10">
                <p class="small text-muted text-white-50">New operative? <a href="signup.html" class="text-success text-decoration-none fw-bold">Create Account</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="login.js"></script>
</body>
</html>
