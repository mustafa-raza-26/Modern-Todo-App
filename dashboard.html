<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - NeonTask</title>
    <link rel="shortcut icon" href="assest/images/logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
    <script src="https://kit.fontawesome.com/63fac70219.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="container-fluid p-0">
        <div class="row g-0">

            <!-- ===================== SIDEBAR (Section) ===================== -->
            <aside class="offcanvas-md offcanvas-start sidebar col-md-2" tabindex="-1" id="sidebarOffcanvas" aria-labelledby="sidebarOffcanvasLabel">

                <div class="offcanvas-header d-md-none justify-content-between align-items-center w-100 mb-3">
                    <h5 class="offcanvas-title neon-text" id="sidebarOffcanvasLabel">NEON_TASK</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" data-bs-target="#sidebarOffcanvas" aria-label="Close"></button>
                </div>

                <div class="offcanvas-body d-flex flex-column h-100 w-100">

                    <div class="mb-4 d-none d-md-block">
                        <h2 class="neon-text h4 mb-0">NEON_TASK</h2>
                        <p class="text-muted smallest text-white-50">PRODUCTIVITY MODE: ON</p>
                    </div>

                    <nav class="nav tpt flex-column gap-2">
                        <a class="nav-link active" href="#"><span class="material-icons-outlined">today</span> Today</a>
                        <button class="neon-btn mt-2 w-100 mb-4 py-2 small" data-bs-toggle="modal" data-bs-target="#taskModal">New Task</button>
                    </nav>

                    <div class="help mt-auto pt-4">
                        <button class="nav-link p-2 px-4" id="logoutBtn"><span class="material-icons-outlined">logout</span> Logout</button>
                    </div>

                </div>
            </aside>

            <!-- ===================== RIGHT SIDE WRAPPER (Navbar + Content) ===================== -->
            <div class="col-12 col-md-10 d-flex flex-column p-0">

                <!-- ---------- NAVBAR (Alag Section) ---------- -->
                <header class="dashboard-navbar d-flex justify-content-between align-items-center px-4 px-md-5 py-4">
                    <div>
                        <p class="text-success mb-0 small text-uppercase fw-bold">Systems Online</p>
                        <h2 class="display-6 fw-bold mb-0">Daily Pulse</h2>
                    </div>
                    <div class="d-flex align-items-center gap-3">
                        <!-- Sidebar toggle button: sirf mobile/tablet (md se neeche) par dikhega -->
                        <button class="btn text-white-50 p-2 d-md-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarOffcanvas" aria-controls="sidebarOffcanvas">
                            <span class="material-icons-outlined">menu</span>
                        </button>

                        <!-- Bell icon + Profile pic: sirf desktop (md aur upar) par dikhenge -->
                        <span class="material-icons-outlined p-2 border border-secondary border-opacity-25 rounded-circle d-none d-md-flex">notifications</span>
                        <i class="fa-solid fa-user text-white-50  d-none d-md-flex"></i>
                    </div>
                </header>

                <!-- ---------- CONTENT AREA (Alag Section) ---------- -->
                <main class="dashboard-content p-4 p-md-5">

                    <!-- Task Input -->
                    <div class="mb-5">
                        <div class="input-group neon-border rounded-3 overflow-hidden bg-dark">
                            <input type="text" class="form-control border-0 bg-transparent py-3 ps-4" placeholder="Initialize a new operation...">
                            <span class="input-group-text border-0 bg-transparent text-muted small pe-3 d-none d-md-flex">CMD + N</span>
                            <button class="btn btn-success rounded-0 px-4" data-bs-toggle="modal" data-bs-target="#taskModal"><span class="material-icons-outlined">add</span></button>
                        </div>
                    </div>

                    <div class="row col-12 g-4">
                       <div class="container">
                            <h4 class="mb-2 mt-4 d-flex align-items-center gap-2"><span class="material-icons-outlined text-success">person</span> My Tasks</h4>
                            <div class="row d-flex justify-content-evenly align-items-center pt-3" id="display">
                                    <!-- Card Display  -->
                            </div>
                        </div>  
                    </div>
                </main>
            </div><!-- end col-md-10 wrapper -->

        </div>
    </div>

    <!-- ===================== MODAL (Row ke bahar, taake grid disturb na ho) ===================== -->
    <div class="modal fade" id="taskModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content task-modal">

                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold text-light">
                    <i class="bi bi-plus-lg text-success me-2"></i>Initialize Task</h5>
                    <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <!-- Title -->
                    <label class="form-label heading">TASK TITLE</label>
                    <div class="input-group mb-4">
                        <span><i class="fa-solid fa-pen-to-square"></i></span>
                        <input type="text" class="form-input" id="todoName" placeholder="What needs to be done?" required>
                    </div>

                    <!-- Description -->
                    <label class="form-label heading">DESCRIPTION</label>
                    <div class="input-group mb-4">
                        <span><i class="fa-solid fa-bars"></i></span>
                        <textarea class="form-textarea" id="todoDescription" rows="5" placeholder="Add context, links, or notes..."></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label heading">PRIORITY LEVEL</label>
                            <div class="d-flex gap-2">
                                <select id="users">
                                    <option class="priority high" value="HIGH">HIGH</option>
                                    <option class="priority mid" value="MID">MID</option>
                                    <option class="priority low" value="LOW">LOW</option>
                                </select>
                            </div>
                        </div>
                    </div>

                </div>

                <div class="modal-footer border-0 justify-content-end">
                    <button class="btn create-btn px-5" id="initailizeBtn">Initialize Task</button>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
